version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: citiaps-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: citiaps
    volumes:
      - mongodb_data:/data/db
    networks:
      - citiaps-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 20s

  backend:
    build: .
    container_name: citiaps-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB_NAME: citiaps
      SERVER_PORT: 8080
      SERVER_HOST: 0.0.0.0
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - citiaps-network

volumes:
  mongodb_data:

networks:
  citiaps-network:
    driver: bridge
